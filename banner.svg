<svg xmlns="http://www.w3.org/2000/svg" width="700" height="360" viewBox="0 0 700 360">
  <defs>
    <linearGradient id="topGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="rgba(45,212,191,0.3)"/>
      <stop offset="70%" stop-color="rgba(232,121,249,0.2)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C1120"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="360" rx="14" fill="url(#bgGrad)"/>
  <rect x="0.5" y="0.5" width="699" height="359" rx="14" fill="none" stroke="rgba(45,212,191,0.12)" stroke-width="1"/>

  <!-- Top glow line -->
  <line x1="140" y1="1" x2="560" y2="1" stroke="url(#topGlow)" stroke-width="1"/>

  <!-- в•җв•җв•җ Cloud Buddy (centered) в•җв•җв•җ -->

  <!-- вҡЎ -->
  <text x="350" y="38" text-anchor="middle" font-size="14" font-family="'Cascadia Code','Consolas','DejaVu Sans Mono','Liberation Mono','Courier New',monospace" fill="#E879F9">вҡЎ</text>

  <!-- в–ҹв–Ҳв–ҷ -->
  <text x="350" y="53" text-anchor="middle" font-size="14" font-family="'Cascadia Code','Consolas','DejaVu Sans Mono','Liberation Mono','Courier New',monospace" fill="#F0EFF5" opacity="0.85">в–ҹв–Ҳв–ҷ</text>

  <!-- в–җв–ӣв—Ҹв–Ҳв—Ҹв–ңв–Ң (face with colored eyes) -->
  <text x="350" y="68" text-anchor="middle" font-size="14" font-family="'Cascadia Code','Consolas','DejaVu Sans Mono','Liberation Mono','Courier New',monospace">
    <tspan fill="#F0EFF5" fill-opacity="0.9">в–җв–ӣ</tspan><tspan fill="#2DD4BF">в—Ҹ</tspan><tspan fill="#F0EFF5" fill-opacity="0.9">в–Ҳ</tspan><tspan fill="#2DD4BF">в—Ҹ</tspan><tspan fill="#F0EFF5" fill-opacity="0.9">в–ңв–Ң</tspan>
  </text>

  <!-- в–қв–ңв–Ҳв–ҝв–Ҳв–ӣв–ҳ (mouth) -->
  <text x="350" y="83" text-anchor="middle" font-size="14" font-family="'Cascadia Code','Consolas','DejaVu Sans Mono','Liberation Mono','Courier New',monospace">
    <tspan fill="#F0EFF5">в–қв–ңв–Ҳ</tspan><tspan fill="#E879F9" fill-opacity="0.7">в–ҝ</tspan><tspan fill="#F0EFF5">в–Ҳв–ӣв–ҳ</tspan>
  </text>

  <!-- в•Ів•І в•ұв•ұ (rain feet) -->
  <text x="350" y="98" text-anchor="middle" font-size="14" font-family="'Cascadia Code','Consolas','DejaVu Sans Mono','Liberation Mono','Courier New',monospace" fill="#2DD4BF" opacity="0.5">в•Ів•І в•ұв•ұ</text>

  <!-- в•җв•җв•җ WEATHER balloon text в•җв•җв•җ -->
  <text font-size="12" font-family="'Cascadia Code','Consolas','DejaVu Sans Mono','Liberation Mono','Courier New',monospace" fill="#F0EFF5" fill-opacity="0.9">
    <tspan x="350" y="125" text-anchor="middle">в–Ҳв–Ҳв•—    в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— </tspan>
    <tspan x="350" y="139" text-anchor="middle">в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—</tspan>
    <tspan x="350" y="153" text-anchor="middle">в–Ҳв–Ҳв•‘ в–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ</tspan>
    <tspan x="350" y="167" text-anchor="middle">в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—</tspan>
    <tspan x="350" y="181" text-anchor="middle">в•ҡв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘</tspan>
    <tspan x="350" y="195" text-anchor="middle"> в•ҡв•җв•җв•қв•ҡв•җв•җв•қ в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ   в•ҡв•җв•қ   в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ</tspan>
  </text>

  <!-- в•җв•җв•җ SIMPLIFIED balloon text в•җв•җв•җ -->
  <text font-size="12" font-family="'Cascadia Code','Consolas','DejaVu Sans Mono','Liberation Mono','Courier New',monospace" fill="#2DD4BF">
    <tspan x="350" y="218" text-anchor="middle">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—     в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— </tspan>
    <tspan x="350" y="232" text-anchor="middle">в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—</tspan>
    <tspan x="350" y="246" text-anchor="middle">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘</tspan>
    <tspan x="350" y="260" text-anchor="middle">в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•қ в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ  в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘</tspan>
    <tspan x="350" y="274" text-anchor="middle">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘ в•ҡв•җв•қ в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ</tspan>
    <tspan x="350" y="288" text-anchor="middle">в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қв•ҡв•җв•қ     в•ҡв•җв•қв•ҡв•җв•қ     в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қв•ҡв•җв•қ     в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•қ</tspan>
  </text>

